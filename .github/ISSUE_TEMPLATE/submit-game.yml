name: 🎮 Submit a game
description: Share a game you made with Claude (or another AI) — open game or paid creator listing.
title: "[Game] "
labels: ["game-submission"]
body:
  - type: input
    id: game-name
    attributes:
      label: Game name
    validations:
      required: true
  - type: input
    id: vibe
    attributes:
      label: One-line vibe
      description: "What does it feel like to play? (e.g. 'liminal hotel corridors at 3am')"
    validations:
      required: true
  - type: dropdown
    id: tier
    attributes:
      label: Listing type
      options:
        - Open game (source in the vault, free to play)
        - Creator listing (demo in the vault, full version paid elsewhere)
    validations:
      required: true
  - type: input
    id: built-with
    attributes:
      label: Which AI helped build it?
      placeholder: "e.g. Claude (Opus 4.8), Claude Code"
    validations:
      required: true
  - type: textarea
    id: game-link
    attributes:
      label: The game
      description: Attach a zip of your game folder, paste a gist link, or link a repo/branch. For creator listings, also include the link to the full version (itch.io etc.).
    validations:
      required: true
  - type: checkboxes
    id: rights
    attributes:
      label: Rights & safety
      options:
        - label: All assets (code, art, music) are mine, AI-generated by me, or licensed for this use.
          required: true
        - label: The game is self-contained — no external network calls, no data collection, no accounts.
          required: true
